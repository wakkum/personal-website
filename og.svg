<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- OG card for yarnoritzen.com — 1200×630 (Open Graph spec) -->

  <defs>
    <!-- Subtle vignette to add depth -->
    <radialGradient id="vignette" cx="20%" cy="30%" r="100%">
      <stop offset="0%" stop-color="#181d24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d0f12" stop-opacity="1"/>
    </radialGradient>
    <!-- Cyan glow used on the accent stripe -->
    <linearGradient id="accentStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#4dd0e1" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#4dd0e1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="900" height="5" fill="url(#accentStripe)"/>

  <!-- Coordinate-style crosshair decoration, right side (subtle nod to OSINT) -->
  <g stroke="#4dd0e1" stroke-width="1" opacity="0.22" fill="none">
    <!-- crosshair 1 -->
    <circle cx="1020" cy="180" r="34"/>
    <line x1="1020" y1="140" x2="1020" y2="220"/>
    <line x1="980"  y1="180" x2="1060" y2="180"/>
    <!-- crosshair 2 -->
    <circle cx="1110" cy="410" r="22"/>
    <line x1="1110" y1="382" x2="1110" y2="438"/>
    <line x1="1082" y1="410" x2="1138" y2="410"/>
    <!-- small marks -->
    <circle cx="940"  cy="370" r="3" fill="#4dd0e1" stroke="none"/>
    <circle cx="1075" cy="290" r="3" fill="#4dd0e1" stroke="none"/>
  </g>

  <!-- Faint coordinate label -->
  <text x="1058" y="183"
        font-family="'JetBrains Mono', 'Courier New', Menlo, monospace"
        font-size="13"
        fill="#4dd0e1"
        opacity="0.45">
    47.6062°N
  </text>
  <text x="1140" y="413" text-anchor="end"
        font-family="'JetBrains Mono', 'Courier New', Menlo, monospace"
        font-size="13"
        fill="#4dd0e1"
        opacity="0.45">
    10.4515°S
  </text>

  <!-- Eyebrow -->
  <text x="80" y="155"
        font-family="'JetBrains Mono', 'Courier New', Menlo, monospace"
        font-size="22"
        letter-spacing="3"
        fill="#4dd0e1"
        font-weight="500">
    INVESTIGATIVE  JOURNALIST
  </text>

  <!-- Name -->
  <text x="80" y="290"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="120"
        font-weight="800"
        letter-spacing="-3"
        fill="#e6e8eb">
    Yarno Ritzen
  </text>

  <!-- Tagline -->
  <text x="80" y="360"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32"
        font-weight="500"
        fill="#a4abb3">
    OSINT  ·  Satellite Imagery  ·  Visual Investigations
  </text>

  <!-- Credentials row -->
  <g font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600">
    <text x="80" y="460" fill="#e6e8eb">IRE Award</text>
    <text x="240" y="460" fill="#6b7280">·</text>
    <text x="260" y="460" fill="#e6e8eb">BAFTA-nominated</text>
    <text x="530" y="460" fill="#6b7280">·</text>
    <text x="550" y="460" fill="#e6e8eb">Amnesty Media Award</text>
    <text x="890" y="460" fill="#6b7280">·</text>
    <text x="910" y="460" fill="#e6e8eb">RTS Award</text>
  </g>

  <!-- Divider line above URL -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#232a32" stroke-width="1"/>

  <!-- Footer row -->
  <text x="80" y="585"
        font-family="'JetBrains Mono', 'Courier New', Menlo, monospace"
        font-size="22"
        font-weight="500"
        fill="#4dd0e1"
        letter-spacing="1">
    yarnoritzen.com
  </text>
  <text x="1120" y="585" text-anchor="end"
        font-family="'JetBrains Mono', 'Courier New', Menlo, monospace"
        font-size="16"
        fill="#6b7280"
        letter-spacing="1.5">
    AL JAZEERA INVESTIGATIVE UNIT
  </text>
</svg>
